<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ViT5 Summarizer</title>
  <style>
    :root {
      color-scheme: light;
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: radial-gradient(circle at 20% 20%, rgba(59,130,246,0.18), transparent 35%),
                  radial-gradient(circle at 80% 0%, rgba(244,114,182,0.16), transparent 32%),
                  #0f172a;
    }
    .card {
      width: min(960px, 100%);
      background: rgba(15, 23, 42, 0.82);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 18px;
      box-shadow: 0 25px 80px rgba(0, 0, 0, 0.3);
      padding: 24px;
      backdrop-filter: blur(8px);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      letter-spacing: -0.5px;
    }
    p {
      margin: 0 0 20px;
      color: #cbd5e1;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
    }
    textarea {
      width: 100%;
      min-height: 200px;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid #1e293b;
      background: #0b1222;
      color: #e2e8f0;
      font-size: 15px;
      resize: vertical;
      transition: border 0.15s ease, box-shadow 0.15s ease;
    }
    textarea:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.25);
    }
    button {
      margin-top: 12px;
      padding: 12px 16px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(120deg, #3b82f6, #06b6d4);
      color: #f8fafc;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.12s ease, box-shadow 0.12s ease;
    }
    button:hover { transform: translateY(-1px); box-shadow: 0 10px 30px rgba(59, 130, 246, 0.35); }
    button:disabled { opacity: 0.6; cursor: not-allowed; box-shadow: none; transform: none; }
    .result {
      margin-top: 18px;
      padding: 16px;
      border-radius: 12px;
      background: #0b1222;
      border: 1px solid rgba(255, 255, 255, 0.04);
      white-space: pre-wrap;
      min-height: 80px;
    }
    .status { margin-top: 8px; color: #94a3b8; font-size: 14px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>ViT5 Summarizer</h1>
    <p>Paste Vietnamese text and generate a concise summary powered by the fine-tuned ViT5 adapter.</p>

    <label for="inputText">Input text</label>
    <textarea id="inputText" placeholder="Nhap noi dung tieng Viet..."></textarea>

    <button id="submitBtn">Summarize</button>
    <div class="status" id="status"></div>

    <div class="result" id="result"></div>
  </div>

  <script>
    const btn = document.getElementById('submitBtn');
    const input = document.getElementById('inputText');
    const result = document.getElementById('result');
    const status = document.getElementById('status');

    async function summarize() {
      const text = input.value.trim();
      if (!text) {
        status.textContent = 'Please enter some text.';
        return;
      }

      btn.disabled = true;
      status.textContent = 'Summarizing...';
      result.textContent = '';

      try {
        const resp = await fetch('/api/summarize', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text })
        });
        if (!resp.ok) {
          const err = await resp.json();
          throw new Error(err.detail || 'Request failed');
        }
        const data = await resp.json();
        result.textContent = data.summary;
        status.textContent = 'Done';
      } catch (err) {
        status.textContent = 'Error: ' + err.message;
      } finally {
        btn.disabled = false;
      }
    }

    btn.addEventListener('click', summarize);
  </script>
</body>
</html>
